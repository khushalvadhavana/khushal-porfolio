<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Khushal Vadhavana – Data Analyst & React JS Developer. Portfolio showcasing skills, experience, and projects." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>Khushal Vadhavana – Portfolio</title>
  </head>
  <body>
    <!-- Professional Splash Screen (CSS Only) -->
    <div id="loader-wrapper">
      <div class="loader-content">
        <div class="loader-logo">
          <div class="pulse-ring"></div>
          <div class="inner-glow"></div>
          <div class="logo-text">KV</div>
        </div>
        <div class="loader-bar-container">
          <div class="loader-bar"></div>
        </div>
        <p class="loader-msg">Khushal Vadhavana Portfolio</p>
      </div>
    </div>

    <style>
      #loader-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #070712;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .loader-logo {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .pulse-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 2px solid #7c3aed;
        border-radius: 50%;
        animation: pulse-ring 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
        opacity: 0;
      }

      .inner-glow {
        position: absolute;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #7c3aed, #06b6d4);
        border-radius: 50%;
        filter: blur(15px);
        opacity: 0.5;
        animation: inner-pulse 2s ease-in-out infinite;
      }

      .logo-text {
        position: relative;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 24px;
        color: #fff;
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
      }

      .loader-bar-container {
        width: 200px;
        height: 2px;
        background: rgba(255,255,255,0.05);
        border-radius: 4px;
        overflow: hidden;
      }

      .loader-bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #7c3aed, #06b6d4);
        border-radius: 4px;
        animation: loader-slide 1.5s ease-in-out infinite;
      }

      .loader-msg {
        font-family: 'Inter', sans-serif;
        font-size: 0.8rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        animation: fade-pulse 2s ease-in-out infinite;
      }

      @keyframes pulse-ring {
        0% { transform: scale(0.6); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: scale(1.4); opacity: 0; }
      }

      @keyframes inner-pulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.1); opacity: 0.6; }
      }

      @keyframes loader-slide {
        0% { transform: translateX(-100%); width: 30%; }
        50% { width: 50%; }
        100% { transform: translateX(250%); width: 30%; }
      }

      @keyframes fade-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      body.loader-loaded #loader-wrapper {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
